    <script>
        // 移动端菜单切换
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // 搜索功能
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const searchContent = document.getElementById('searchContent');
        let posts = [];
        let selectedIndex = -1;

        // 加载搜索索引
        fetch('../search.json')
            .then(response => response.json())
            .then(data => {
                posts = data;
            })
            .catch(error => {
                console.log('加载搜索索引失败:', error);
            });

        // 搜索函数
        function performSearch(query) {
            if (!query.trim()) {
                searchResults.classList.add('hidden');
                selectedIndex = -1;
                return;
            }

            const lowerQuery = query.toLowerCase();
            const results = posts.filter(post => {
                return post.title.toLowerCase().includes(lowerQuery) ||
                       post.excerpt.toLowerCase().includes(lowerQuery);
            });

            displayResults(results, lowerQuery);
            selectedIndex = results.length > 0 ? 0 : -1;
            updateSelection();
        }

        // 高亮关键词
        function highlight(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<mark class="bg-yellow-200 rounded px-1">$1</mark>');
        }

        // 显示搜索结果
        function displayResults(results, query) {
            if (results.length === 0) {
                searchContent.innerHTML = '<div class="px-4 py-3 text-sm text-gray-400">未找到相关内容</div>';
                searchResults.classList.remove('hidden');
                return;
            }

            const html = results.map((post, index) => `
                <a href="../${post.url}" class="search-result-item block px-4 py-3 border-b border-gray-50 ${index === selectedIndex ? 'active' : ''}">
                    <div class="font-medium text-gray-800 text-sm mb-1">${highlight(post.title, query)}</div>
                    <div class="text-xs text-gray-400 mb-1">${post.date}</div>
                    <div class="text-xs text-gray-500 line-clamp-1">${post.excerpt}</div>
                </a>
            `).join('');

            searchContent.innerHTML = html;
            searchResults.classList.remove('hidden');
        }

        // 更新选中状态
        function updateSelection() {
            document.querySelectorAll('.search-result-item').forEach((item, index) => {
            if (index === selectedIndex) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
        }

        // 键盘导航
        searchInput.addEventListener('keydown', (e) => {
            const items = document.querySelectorAll('.search-result-item');
            if (items.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectedIndex = (selectedIndex + 1) % items.length;
                updateSelection();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectedIndex = selectedIndex <= 0 ? items.length - 1 : selectedIndex - 1;
                updateSelection();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (selectedIndex >= 0) {
                    const link = items[selectedIndex].getAttribute('href');
                    window.location.href = link;
                }
            } else if (e.key === 'Escape') {
                searchResults.classList.add('hidden');
                searchInput.value = '';
                selectedIndex = -1;
            }
        });

        // 输入事件
        searchInput.addEventListener('input', () => {
            performSearch(searchInput.value);
        });

        // 点击外部关闭搜索结果
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.classList.add('hidden');
            }
        });

        // 聚焦时显示结果
        searchInput.addEventListener('focus', () => {
            if (searchInput.value.trim()) {
                performSearch(searchInput.value);
            }
        });
    </script>
