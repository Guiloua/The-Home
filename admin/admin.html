<!DOCTYPE html>
<html lang="zh-CN" class="bg-[#fbfbfb]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记管理 | 个人主页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        * {
            box-sizing: border-box;
        }
        .editor-container {
            height: calc(100vh - 220px);
        }
        .editor textarea {
            resize: none;
        }
        .preview {
            overflow-y: auto;
        }
        .note-item:hover {
            background-color: #f5f5f5;
        }
        .note-item.active {
            background-color: #ebebeb;
        }
        .badge-published {
            background-color: #10b981;
            color: white;
        }
        .badge-draft {
            background-color: #6b7280;
            color: white;
        }
        .tab-active {
            background-color: #e5e7eb;
        }
        /* Article content styles for preview */
        .preview .article-content p {
            margin-bottom: 1.25rem;
            line-height: 1.8;
        }
        .preview .article-content h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 2rem 0 1rem;
            color: #111827;
        }
        .preview .article-content h3 {
            font-size: 1.25rem;
            font-weight: 500;
            margin: 1.75rem 0 0.75rem;
            color: #1f2937;
        }
        .preview .article-content ul, .preview .article-content ol {
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
        }
        .preview .article-content li {
            margin-bottom: 0.5rem;
            line-height: 1.7;
        }
        .preview .article-content code {
            background-color: #f3f4f6;
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-size: 0.875em;
            font-family: monospace;
        }
        .preview .article-content pre {
            background-color: #1f2937;
            color: #f9fafb;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1.25rem;
        }
        .preview .article-content pre code {
            background: none;
            color: inherit;
            padding: 0;
        }
        .preview .article-content blockquote {
            border-left: 4px solid #e5e7eb;
            padding-left: 1rem;
            color: #6b7280;
            margin: 1.5rem 0;
            font-style: italic;
        }
    </style>
</head>
<body class="bg-[#fbfbfb] pt-16 min-h-screen">

    <!-- 侧边栏选项卡 -->

        window.marked = marked;

    <script>
// === GLOBAL VARIABLES DECLARATION ===
let rootDirHandle = null;
let notesDirHandle = null;
let writingDirHandle = null;
let notesFiles = [];
let currentNote = null;
let currentFileHandle = null;
let searchQuery = '';
let currentTab = 'notes';

// === ARTICLE HTML TEMPLATE CONSTANT ===
const POST_TEMPLATE = `<!DOCTYPE html>
<html lang="zh-CN">

<body>

    <script>
        // 移动端菜单切换
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // 搜索功能
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const searchContent = document.getElementById('searchContent');
        let posts = [];
        let selectedIndex = -1;

        // 加载搜索索引
        fetch('../search.json')
            .then(response => response.json())
            .then(data => {
                posts = data;
            })
            .catch(error => {
                console.log('加载搜索索引失败:', error);
            });

        // 搜索函数
        function performSearch(query) {
            if (!query.trim()) {
                searchResults.classList.add('hidden');
                selectedIndex = -1;
                return;
            }

            const lowerQuery = query.toLowerCase();
            const results = posts.filter(post => {
                return post.title.toLowerCase().includes(lowerQuery) ||
                       post.excerpt.toLowerCase().includes(lowerQuery);
            });

            displayResults(results, lowerQuery);
            selectedIndex = results.length > 0 ? 0 : -1;
            updateSelection();
        }

        // 高亮关键词
        function highlight(text, query) {
            if (!query) return text;
            const regex = new RegExp(\`(\${query})\`, 'gi');
            return text.replace(regex, '<mark class="bg-yellow-200 rounded px-1">$1</mark>');
        }

        // 显示搜索结果
        function displayResults(results, query) {
            if (results.length === 0) {
                searchContent.innerHTML = '<div class="px-4 py-3 text-sm text-gray-400">未找到相关内容</div>';
                searchResults.classList.remove('hidden');
                return;
            }

            const html = results.map((post, index) => \`
                <a href="../\${post.url}" class="search-result-item block px-4 py-3 border-b border-gray-50 \${index === selectedIndex ? 'active' : ''}">
                    <div class="font-medium text-gray-800 text-sm mb-1">\${highlight(post.title, query)}</div>
                    <div class="text-xs text-gray-400 mb-1">\${post.date}</div>
                    <div class="text-xs text-gray-500 line-clamp-1">\${post.excerpt}</div>
                </a>
            \`).join('');

            searchContent.innerHTML = html;
            searchResults.classList.remove('hidden');
        }

        // 更新选中状态
        function updateSelection() {
            document.querySelectorAll('.search-result-item').forEach((item, index) => {
                if (index === selectedIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // 键盘导航
        searchInput.addEventListener('keydown', (e) => {
            const items = document.querySelectorAll('.search-result-item');
            if (items.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectedIndex = (selectedIndex + 1) % items.length;
                updateSelection();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectedIndex = selectedIndex <= 0 ? items.length - 1 : selectedIndex - 1;
                updateSelection();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (selectedIndex >= 0) {
                    const link = items[selectedIndex].getAttribute('href');
                    window.location.href = link;
                }
            } else if (e.key === 'Escape') {
                searchResults.classList.add('hidden');
                searchInput.value = '';
                selectedIndex = -1;
            }
        });

        // 输入事件
        searchInput.addEventListener('input', () => {
            performSearch(searchInput.value);
        });

        // 点击外部关闭搜索结果
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.classList.add('hidden');
            }
        });

        // 聚焦时显示结果
        searchInput.addEventListener('focus', () => {
            if (searchInput.value.trim()) {
                performSearch(searchInput.value);
            }
        });
    <\/script>
</body>

// === SELECT ROOT DIRECTORY ===
async function selectRootDir() {
    try {
        rootDirHandle = await window.showDirectoryPicker();
        // Get subdirectory handles, create if not exists
        try {
            notesDirHandle = await rootDirHandle.getDirectoryHandle('notes', { create: true });
        } catch (e) {
            notesDirHandle = await rootDirHandle.getDirectoryHandle('notes');
        }
        try {
            writingDirHandle = await rootDirHandle.getDirectoryHandle('writing', { create: true });
        } catch (e) {
            writingDirHandle = await rootDirHandle.getDirectoryHandle('writing');
        }

        document.getElementById('dirStatus').textContent = '已选择项目根目录';
        document.getElementById('dirStatus').classList.remove('text-gray-500');
        document.getElementById('dirStatus').classList.add('text-green-600');
        document.getElementById('btnNewNote').disabled = false;
        document.getElementById('btnPublishAll').disabled = false;

        await loadNotesList();
        if (currentTab === 'profile') {
            await loadProfile();
        }
    } catch (e) {
        console.error(e);
        alert('选择文件夹失败: ' + e.message);
    }
}
window.selectRootDir = selectRootDir;

// === PARSE FRONTMATTER ===
function parseFrontmatter(content) {
    // Support both Windows \r\n and Unix \n
    const frontmatterRegex = /^\s*---(?:\r?\n)([\s\S]*?)(?:\r?\n)---(?:\r?\n)/;
    const match = content.match(frontmatterRegex);

    const metadata = {
        title: '',
        date: new Date().toISOString().split('T')[0],
        excerpt: '',
        publish: false,
        tags: ''
    };
    let body = content;

    if (match && match[1]) {
        const frontmatterText = match[1];
        body = content.slice(match[0].length);

        frontmatterText.trim().split('\n').forEach(line => {
            line = line.trim();
            if (!line || !line.includes(':')) return;
            const [key, ...valueParts] = line.split(':');
            let value = valueParts.join(':').trim();
            key = key.trim();
            if (value.toLowerCase() === 'true') value = true;
            if (value.toLowerCase() === 'false') value = false;
            metadata[key] = value;
        });
    }

    return { metadata, body };
}

// === GENERATE FRONTMATTER TEXT ===
function generateFrontmatter(metadata) {
    let lines = ['---'];
    for (const [key, value] of Object.entries(metadata)) {
        if (value !== undefined && value !== null && value !== '') {
            lines.push(`${key}: ${value}`);
        }
    }
    lines.push('---');
    return lines.join('\n') + '\n\n';
}

// === GENERATE SLUG ===
function slugify(title) {
    if (!title) return 'untitled';
    return title
        .toLowerCase()
        .replace(/[^\w\s-]/g, '')
        .replace(/\s+/g, '-')
        .trim();
}

// === LOAD NOTES LIST ===
async function loadNotesList() {
    if (!notesDirHandle) return;

    notesFiles = [];
    const notesListEl = document.getElementById('notesList');
    notesListEl.innerHTML = '';

    try {
        for await (const entry of notesDirHandle.values()) {
            if (entry.kind === 'file' && entry.name.endsWith('.md')) {
                try {
                    const file = await entry.getFile();
                    const content = await file.text();
                    const { metadata } = parseFrontmatter(content);
                    notesFiles.push({
                        name: entry.name,
                        handle: entry,
                        metadata: metadata,
                        filename: entry.name
                    });
                } catch (e) {
                    console.warn('Skipping file', entry.name, e);
                }
            }
        }

        // Sort by date descending
        notesFiles.sort((a, b) => {
            return (b.metadata.date || '').localeCompare(a.metadata.date || '');
        });

        renderNotesList();
    } catch (e) {
        console.error(e);
        notesListEl.innerHTML = `<div class="p-4 text-red-500 text-sm">加载失败: ${e.message}</div>`;
    }
}

// === RENDER NOTES LIST ===
function renderNotesList() {
    const notesListEl = document.getElementById('notesList');
    let filtered = notesFiles;
    if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(n =>
            (n.metadata.title || '').toLowerCase().includes(q) ||
            (n.metadata.excerpt || '').toLowerCase().includes(q) ||
            (n.filename || '').toLowerCase().includes(q)
        );
    }

    if (filtered.length === 0) {
        notesListEl.innerHTML = '<div class="p-8 text-center text-gray-400 text-sm">未找到笔记</div>';
        return;
    }

    notesListEl.innerHTML = filtered.map(note => {
        const isActive = currentNote && currentNote.filename === note.filename;
        const badgeClass = note.metadata.publish ? 'badge-published' : 'badge-draft';
        const badgeText = note.metadata.publish ? '已发布' : '草稿';
        return `
            <div class="note-item ${isActive ? 'active' : ''} p-3 cursor-pointer" onclick="openNote('${escapeHtml(note.filename)}')">
                <div class="flex items-start justify-between mb-1">
                    <div class="font-medium text-gray-800 text-sm truncate pr-2">${escapeHtml(note.metadata.title || note.filename)}</div>
                    <span class="px-2 py-0.5 rounded-full text-xs ${badgeClass}">${badgeText}</span>
                </div>
                <div class="text-xs text-gray-400 mb-1">${escapeHtml(note.metadata.date || '无日期')}</div>
                <div class="text-xs text-gray-500 line-clamp-1">${escapeHtml(note.metadata.excerpt || '')}</div>
            </div>
        `;
    }).join('');
}

function filterNotes() {
    searchQuery = document.getElementById('searchInput').value.trim();
    renderNotesList();
}
window.filterNotes = filterNotes;

// === NEW NOTE ===
function newNote() {
    const today = new Date().toISOString().split('T')[0];
    currentNote = {
        metadata: {
            title: '',
            date: today,
            excerpt: '',
            publish: false,
            tags: ''
        },
        content: '',
        filename: ''
    };
    currentFileHandle = null;

    // Fill form
    document.getElementById('currentNoteTitle').textContent = '新建笔记';
    document.getElementById('metaTitle').value = currentNote.metadata.title;
    document.getElementById('metaDate').value = currentNote.metadata.date;
    document.getElementById('metaExcerpt').value = currentNote.metadata.excerpt;
    document.getElementById('metaTags').value = currentNote.metadata.tags || '';
    document.getElementById('publishCheck').checked = currentNote.metadata.publish;
    document.getElementById('editorContent').value = '';
    document.getElementById('editorContent').disabled = false;
    document.getElementById('btnSave').disabled = false;
    document.getElementById('btnPublishCurrent').disabled = true;
    document.getElementById('btnDelete').disabled = true;
    updatePreview();
    renderNotesList();
}
window.newNote = newNote;

// === OPEN NOTE ===
async function openNote(filename) {
    const note = notesFiles.find(n => n.name === filename);
    if (!note) return;

    try {
        const file = await note.handle.getFile();
        const content = await file.text();
        const { metadata, body } = parseFrontmatter(content);

        currentNote = {
            metadata: metadata,
            content: body,
            filename: filename
        };
        currentFileHandle = note.handle;

        // Fill form
        document.getElementById('currentNoteTitle').textContent = metadata.title || filename;
        document.getElementById('metaTitle').value = metadata.title || '';
        document.getElementById('metaDate').value = metadata.date || new Date().toISOString().split('T')[0];
        document.getElementById('metaExcerpt').value = metadata.excerpt || '';
        document.getElementById('metaTags').value = metadata.tags || '';
        document.getElementById('publishCheck').checked = !!metadata.publish;
        document.getElementById('editorContent').value = body.trim();
        document.getElementById('editorContent').disabled = false;
        document.getElementById('btnSave').disabled = false;
        document.getElementById('btnPublishCurrent').disabled = false;
        document.getElementById('btnDelete').disabled = false;

        updatePreview();
        renderNotesList();
    } catch (e) {
            console.error(e);
            alert('打开笔记失败: ' + e.message);
        }
}
window.openNote = openNote;

// === UPDATE METADATA ===
function updateMetadata() {
    if (!currentNote) return;
    currentNote.metadata.title = document.getElementById('metaTitle').value;
    currentNote.metadata.date = document.getElementById('metaDate').value;
    currentNote.metadata.excerpt = document.getElementById('metaExcerpt').value;
    currentNote.metadata.tags = document.getElementById('metaTags').value;
    currentNote.metadata.publish = document.getElementById('publishCheck').checked;
    document.getElementById('currentNoteTitle').textContent = currentNote.metadata.title || '未命名';
}
window.updateMetadata = updateMetadata;

// === EDITOR INPUT ===
function onEditorInput() {
    if (!currentNote) return;
    currentNote.content = document.getElementById('editorContent').value;
    updatePreview();
}
window.onEditorInput = onEditorInput;

// === UPDATE PREVIEW ===
function updatePreview() {
    if (!currentNote || !window.marked) {
        document.getElementById('previewArea').innerHTML = '<div class="text-gray-400 text-sm text-center mt-10">加载中...</div>';
        return;
    }
    const html = window.marked.parse(currentNote.content || '');
    document.getElementById('previewArea').innerHTML = `<div class="article-content">${html}</div>`;
}

// === ESCAPE HTML ===
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// === GENERATE POST HTML ===
function generatePostHtml(post) {
    const contentHtml = window.marked ? window.marked.parse(post.content) : post.content;
    let tagsHtml = '';
    if (post.metadata.tags && post.metadata.tags.trim()) {
        const tags = post.metadata.tags.split(',').map(t => t.trim()).filter(t => t);
        tagsHtml = tags.map(t => `#${t}`).join(' ');
    }

    let html = POST_TEMPLATE
        .replace(/{title}/g, escapeHtml(post.metadata.title || ''))
        .replace(/{date}/g, escapeHtml(post.metadata.date || ''))
        .replace(/{excerpt}/g, escapeHtml(post.metadata.excerpt || ''))
        .replace(/{content}/g, contentHtml)
        .replace(/{tagsHtml}/g, tagsHtml);

    return html;
}

// === UPDATE WRITING INDEX ===
async function updateWritingIndex(publishedPosts) {
    try {
        let indexHandle;
        try {
            indexHandle = await writingDirHandle.getFileHandle('index.html');
        } catch (e) {
            throw new Error('writing/index.html 不存在，请确保项目结构正确');
        }

        const indexFile = await indexHandle.getFile();
        const indexContent = await indexFile.text();

        // Generate post items HTML
        const postItems = publishedPosts.map(post => {
            const slug = slugify(post.metadata.title);
            return `                <div class="post-item bg-white rounded-xl p-6 border border-gray-100 shadow-sm">
                    <a href="./${slug}.html">
                        <div class="flex items-center justify-between mb-2">
                            <h2 class="text-xl font-medium text-gray-800 hover:text-gray-600 transition-colors">${escapeHtml(post.metadata.title)}</h2>
                            <span class="text-xs text-gray-400">${escapeHtml(post.metadata.date || '')}</span>
                        </div>
                        <p class="text-gray-500 text-sm line-clamp-2">${escapeHtml(post.metadata.excerpt || '')}</p>
                    </a>
                </div>`;
        }).join('\n');

        if (postItems === '') {
            postItems = '                <div class="text-center text-gray-400 py-10">暂无发布的文章</div>';
        }

        // Match by container id
        const pattern = /(<div class="space-y-6" id="postList">)[\s\S]*?(<\/div>\s*<\/main>)/;
        const match = indexContent.match(pattern);

        if (!match) {
            throw new Error('无法找到文章列表容器 #postList，请检查 writing/index.html');
        }

        const newContent = indexContent.replace(pattern, `$1\n${postItems}\n$2`);

        // Write back
        const writable = await indexHandle.createWritable();
        await writable.write(newContent);
        await writable.close();
    } catch (e) {
        console.error(e);
        throw new Error(`更新文章列表失败: ${e.message}`);
    }
}

// === UPDATE SEARCH.JSON ===
async function updateSearchJson(publishedPosts) {
    try {
        const searchIndex = publishedPosts.map(post => {
            const slug = slugify(post.metadata.title);
            return {
                title: post.metadata.title,
                url: `./writing/${slug}.html`,
                excerpt: post.metadata.excerpt || '',
                date: post.metadata.date || ''
            };
        });

        // Sort by date descending
        searchIndex.sort((a, b) => b.date.localeCompare(a.date));

        const jsonContent = JSON.stringify(searchIndex, null, 4);
        const searchHandle = await rootDirHandle.getFileHandle('search.json', { create: true });
        const writable = await searchHandle.createWritable();
        await writable.write(jsonContent);
        await writable.close();
    } catch (e) {
        console.error(e);
        throw new Error(`更新搜索索引失败: ${e.message}`);
    }
}

// === PUBLISH CURRENT NOTE ===
async function publishCurrentNote() {
    if (!currentNote || !writingDirHandle) return;

    try {
        document.getElementById('publishStatus').textContent = '正在发布...';
        document.getElementById('publishStatus').className = 'text-blue-500';

        // Save first
        await saveNote();

        // Reload all notes for latest data
        await loadNotesList();

        // Generate HTML
        const slug = slugify(currentNote.metadata.title);
        const htmlContent = generatePostHtml({
            metadata: currentNote.metadata,
            content: currentNote.content
        });

        // Write to writing/
        const fileHandle = await writingDirHandle.getFileHandle(`${slug}.html`, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(htmlContent);
        await writable.close();

        // Get all published posts for index update
        const publishedPosts = notesFiles
            .filter(n => n.metadata.publish);

        await updateWritingIndex(publishedPosts);
        await updateSearchJson(publishedPosts);

        document.getElementById('publishStatus').textContent = `✓ 已发布: ${slug}.html`;
        document.getElementById('publishStatus').className = 'text-green-600';

        alert('发布成功！刷新随笔页面即可看到新文章。');
    } catch (e) {
        console.error(e);
        document.getElementById('publishStatus').textContent = `✗ 发布失败: ${e.message}`;
        document.getElementById('publishStatus').className = 'text-red-500';
        alert('发布失败: ' + e.message);
    }
}
window.publishCurrentNote = publishCurrentNote;

// === PUBLISH ALL ===
async function publishAll() {
    if (!confirm('确认要重新发布所有标记为"发布"的笔记吗？')) return;

    try {
        document.getElementById('publishStatus').textContent = '正在批量发布...';
        document.getElementById('publishStatus').className = 'text-blue-500';

        const publishedPosts = [];

        for (const noteFile of notesFiles) {
            if (!noteFile.metadata.publish) continue;

            // Read file content
            const file = await noteFile.handle.getFile();
            const content = await file.text();
            const { metadata, body } = parseFrontmatter(content);

            // Generate HTML
            const slug = slugify(metadata.title);
            const htmlContent = generatePostHtml({ metadata, content: body });

            // Write
            const fileHandle = await writingDirHandle.getFileHandle(`${slug}.html`, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(htmlContent);
            await writable.close();

            publishedPosts.push({ metadata, content: body });
            console.log(`Published: ${slug}.html`);
        }

        // Clean up: remove HTML files for notes that are no longer published
        await cleanupUnpublishedPosts();

        // Update index and search
        await updateWritingIndex(publishedPosts);
        await updateSearchJson(publishedPosts);

        document.getElementById('publishStatus').textContent = `✓ 完成！共发布 ${publishedPosts.length} 篇文章，已清理未发布笔记`;
        document.getElementById('publishStatus').className = 'text-green-600';
        alert(`发布完成！共发布 ${publishedPosts.length} 篇文章，已清理未发布笔记的 HTML 文件`);
    } catch (e) {
        console.error(e);
        document.getElementById('publishStatus').textContent = `✗ 发布失败: ${e.message}`;
        document.getElementById('publishStatus').className = 'text-red-500';
        alert('发布失败: ' + e.message);
    }
}
window.publishAll = publishAll;

// === SAVE NOTE ===
async function saveNote() {
    if (!notesDirHandle || !currentNote) return;

    updateMetadata();

    // Validate required fields
    if (!currentNote.metadata.title || !currentNote.metadata.title.trim()) {
        alert('请填写文章标题');
        return;
    }

    // Check if we need to unpublish (was published but now unchecked)
    const wasPublished = currentFileHandle && currentNote.metadata.publish === false;
    let oldSlug = null;
    if (wasPublished) {
        // Get the slug from existing note
        oldSlug = slugify(currentNote.metadata.title);
    }

    const slug = slugify(currentNote.metadata.title);
    const filename = currentFileHandle ? currentNote.filename : `${slug}.md`;

    // Combine full content
    const fullContent = generateFrontmatter(currentNote.metadata) + (currentNote.content || '').trim() + '\n';

    try {
        let fileHandle;
        if (currentFileHandle) {
            // Overwrite existing file
            const writable = await currentFileHandle.createWritable();
            await writable.write(fullContent);
            await writable.close();
            fileHandle = currentFileHandle;
        } else {
            // Create new file
            fileHandle = await notesDirHandle.getFileHandle(filename, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(fullContent);
            await writable.close();
            currentFileHandle = fileHandle;
            currentNote.filename = filename;
        }

        // If was published but now is unpublished, remove the HTML file
        if (oldSlug && wasPublished) {
            await removePublishedPost(oldSlug);
            // Update indexes
            const publishedPosts = notesFiles
                .filter(n => n.metadata.publish);
            await updateWritingIndex(publishedPosts);
            await updateSearchJson(publishedPosts);
        }

        document.getElementById('saveStatus').textContent = `✓ 已保存 ${filename} (${new Date().toLocaleTimeString()})`;
        document.getElementById('saveStatus').className = 'text-green-600';
        document.getElementById('btnPublishCurrent').disabled = false;

        await loadNotesList();
    } catch (e) {
        console.error(e);
        document.getElementById('saveStatus').textContent = `✗ 保存失败: ${e.message}`;
        document.getElementById('saveStatus').className = 'text-red-500';
        alert('保存失败: ' + e);
    }
}
window.saveNote = saveNote;

// === REMOVE PUBLISHED POST ===
async function removePublishedPost(slug) {
    if (!writingDirHandle) return;
    try {
        await writingDirHandle.removeEntry(`${slug}.html`);
        console.log(`Removed published: ${slug}.html`);
    } catch (e) {
        // 文件不存在时忽略错误
        console.log(`File ${slug}.html not found, skipping removal`);
    }
}

// === CLEANUP UNPUBLISHED POSTS ===
async function cleanupUnpublishedPosts() {
    if (!writingDirHandle) return;

    // 获取所有已发布的 slug
    const publishedSlugs = notesFiles
        .filter(n => n.metadata.publish)
        .map(n => slugify(n.metadata.title));

    // 遍历 writing 目录，删除不在发布列表中的 HTML 文件
    try {
        for await (const entry of writingDirHandle.values()) {
            if (entry.kind === 'file' &&
                entry.name.endsWith('.html') &&
                entry.name !== 'index.html') {
                const slug = entry.name.replace('.html', '');
                if (!publishedSlugs.includes(slug)) {
                    await writingDirHandle.removeEntry(entry.name);
                    console.log(`Cleaned up stale: ${entry.name}`);
                }
            }
        }
    } catch (e) {
        console.warn('Cleanup incomplete:', e);
    }
}

// === DELETE NOTE ===
async function deleteNote() {
    if (!currentFileHandle || !confirm('确认删除这篇笔记吗？删除后无法恢复。')) return;

    try {
        // 如果笔记已发布，先删除发布的 HTML 文件
        if (currentNote && currentNote.metadata.publish) {
            const slug = slugify(currentNote.metadata.title);
            await removePublishedPost(slug);
        }

        await notesDirHandle.removeEntry(currentFileHandle.name);
        currentNote = null;
        currentFileHandle = null;

        document.getElementById('currentNoteTitle').textContent = '请选择或新建笔记';
        document.getElementById('metaTitle').value = '';
        document.getElementById('metaExcerpt').value = '';
        document.getElementById('editorContent').value = '';
        document.getElementById('editorContent').disabled = true;
        document.getElementById('btnSave').disabled = true;
        document.getElementById('btnPublishCurrent').disabled = true;
        document.getElementById('btnDelete').disabled = true;
        document.getElementById('previewArea').innerHTML = '<div class="text-gray-400 text-sm text-center mt-10">选择或新建笔记后在这里预览</div>';
        document.getElementById('saveStatus').textContent = '';

        await loadNotesList();

        // 更新索引，移除已删除笔记
        const publishedPosts = notesFiles
            .filter(n => n.metadata.publish);
        await updateWritingIndex(publishedPosts);
        await updateSearchJson(publishedPosts);
    } catch (e) {
        console.error(e);
        alert('删除失败: ' + e.message);
    }
}
window.deleteNote = deleteNote;

// === LOAD PROFILE ===
async function loadProfile() {
    if (!rootDirHandle) {
        document.getElementById('profileStatus').textContent = '请先选择项目根目录';
        document.getElementById('profileStatus').className = 'mt-3 text-sm text-yellow-500';
        return;
    }

    try {
        const profileDir = await rootDirHandle.getDirectoryHandle('profile');
        const indexFileHandle = await profileDir.getFileHandle('index.html');
        const file = await indexFileHandle.getFile();
        const content = await file.text();

        // Extract about content - safe matching with null check
        let aboutContent = '';
        const aboutMatch = content.match(/<div class="text-gray-600 space-y-4 leading-relaxed">([\s\S]*?)<\/div>\s*<\/div>\s*<div class="mt-8">/);
        if (aboutMatch && aboutMatch[1]) {
            aboutContent = aboutMatch[1].trim();
        }
        document.getElementById('profileContent').value = aboutContent;

        // Extract name - with null check
        const nameMatch = content.match(/<h1[^>]*>([\s\S]*?)<\/h1>/);
        if (nameMatch && nameMatch[1]) {
            document.getElementById('profileName').value = nameMatch[1].trim();
        } else {
            document.getElementById('profileName').value = '';
        }

        // Extract title - safe with null check
        let titleContent = '';
        const titleMatch = content.match(/<p class="text-gray-500 font-light">([\s\S]*?)<\/p>/);
        if (titleMatch && titleMatch[1]) {
            titleContent = titleMatch[1].trim();
        }
        document.getElementById('profileTitle').value = titleContent;

        // Extract skills - safe parsing
        const skillsMatch = content.match(/<div class="flex flex-wrap gap-2">([\s\S]*?)<\/div>/);
        const skills = [];
        if (skillsMatch && skillsMatch[1]) {
            const skillRegex = /<span[^>]*>([^<]+)<\/span>/g;
            let match;
            while ((match = skillRegex.exec(skillsMatch[1])) !== null) {
                if (match[1] && match[1].trim()) {
                    skills.push(match[1].trim());
                }
            }
        }
        document.getElementById('profileSkills').value = skills.join(', ');

        document.getElementById('profileStatus').textContent = '已加载个人简介';
        document.getElementById('profileStatus').className = 'mt-3 text-sm text-green-600';
    } catch (e) {
        console.error(e);
        document.getElementById('profileStatus').textContent = `加载失败: ${e.message}`;
        document.getElementById('profileStatus').className = 'mt-3 text-sm text-red-500';
    }
}
window.loadProfile = loadProfile;

// === SAVE PROFILE ===
async function saveProfile() {
    if (!rootDirHandle) {
        alert('请先选择项目根目录');
        return;
    }

    try {
        const aboutContent = document.getElementById('profileContent').value;
        const name = document.getElementById('profileName').value || '';
        const title = document.getElementById('profileTitle').value || '';
        const skillsText = document.getElementById('profileSkills').value || '';
        const skills = skillsText.split(',').map(s => s.trim()).filter(s => s);

        // Read existing file
        const profileDir = await rootDirHandle.getDirectoryHandle('profile');
        const indexFileHandle = await profileDir.getFileHandle('index.html');
        const file = await indexFileHandle.getFile();
        let content = await file.text();

        // Replace name - safe replacement
        content = content.replace(
            /(<h1 class="text-3xl md:text-4xl font-light text-gray-800 mb-2">)[\s\S]*?(<\/h1>)/,
            `$1${name}$2`
        );

        // Replace title
        content = content.replace(
            /(<p class="text-gray-500 font-light">)[\s\S]*?(<\/p>)/,
            `$1${title}$2`
        );

        // Replace about
        content = content.replace(
            /(<div class="text-gray-600 space-y-4 leading-relaxed">)[\s\S]*?(<\/div>\s*<\/div>\s*<div class="mt-8">)/,
            `$1\n${aboutContent}\n$2`
        );

        // Replace skills
        if (skills.length > 0) {
            const skillsHtml = skills.map(s => `                        <span class="px-3 py-1 bg-gray-50 border border-gray-200 rounded-full text-sm text-gray-600">${s}</span>\n`).join('');
            content = content.replace(
                /(<div class="flex flex-wrap gap-2">)[\s\S]*?(<\/div>)/,
                `$1\n${skillsHtml}                    $2`
            );
        }

        // Write back
        const writable = await indexFileHandle.createWritable();
        await writable.write(content);
        await writable.close();

        document.getElementById('profileStatus').textContent = '✓ 保存成功！刷新页面即可看到更新';
        document.getElementById('profileStatus').className = 'mt-3 text-sm text-green-600';
        alert('保存成功！');
    } catch (e) {
        console.error(e);
        document.getElementById('profileStatus').textContent = `✗ 保存失败: ${e.message}`;
        document.getElementById('profileStatus').className = 'mt-3 text-sm text-red-500';
        alert('保存失败: ' + e.message);
    }
}
window.saveProfile = saveProfile;
