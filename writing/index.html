<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随笔 | 个人主页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background-color: #fbfbfb;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-item {
            position: relative;
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background-color: #333;
            transition: width 0.3s ease;
        }

        .nav-item:hover::after {
            width: 100%;
        }

        .search-container {
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
        }

        .search-result-item {
            transition: background-color 0.15s ease;
        }

        .search-result-item:hover {
            background-color: #f5f5f5;
        }

        .search-result-item.active {
            background-color: #f5f5f5;
        }

        .post-item {
            transition: transform 0.2s ease;
        }

        .post-item:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md border-b border-gray-100 z-50 fade-in" style="animation-delay: 0.1s">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex-shrink-0">
                    <a href="../index.html" class="text-xl font-medium text-gray-800 hover:text-gray-600 transition-colors">Me</a>
                </div>

                <!-- 导航菜单 -->
                <div class="hidden md:flex items-center space-x-8">
                    <a href="./index.html" class="nav-item text-gray-600 hover:text-gray-900 text-sm font-light transition-colors">随笔</a>
                    <a href="../profile/" class="nav-item text-gray-600 hover:text-gray-900 text-sm font-light transition-colors">简介</a>
                    <a href="../demo/" class="nav-item text-gray-600 hover:text-gray-900 text-sm font-light transition-colors">Demo</a>
                </div>

                <!-- 搜索框 -->
                <div class="relative search-container">
                    <div class="flex items-center bg-gray-50 rounded-full px-3 py-1.5 border border-gray-100 hover:border-gray-200 transition-all">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                        <input
                            type="text"
                            placeholder="搜索随笔..."
                            class="search-input bg-transparent ml-2 w-24 md:w-32 text-sm text-gray-700 placeholder-gray-400 focus:w-32 md:focus:w-48 transition-all duration-300"
                            id="searchInput"
                            autocomplete="off"
                        >
                    </div>
                    <!-- 搜索结果下拉框 -->
                    <div id="searchResults" class="absolute top-full right-0 mt-2 w-72 bg-white rounded-lg shadow-lg border border-gray-100 hidden max-h-80 overflow-y-auto z-50">
                        <div id="searchContent"></div>
                    </div>
                </div>

                <!-- 移动端菜单按钮 -->
                <button class="md:hidden flex items-center" id="mobileMenuBtn">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 移动端菜单 -->
        <div class="md:hidden hidden bg-white border-t border-gray-100" id="mobileMenu">
            <div class="px-4 py-3 space-y-3">
                <a href="./index.html" class="block text-gray-600 hover:text-gray-900 text-sm font-light">随笔</a>
                <a href="../profile/" class="block text-gray-600 hover:text-gray-900 text-sm font-light">简介</a>
                <a href="../demo/" class="block text-gray-600 hover:text-gray-900 text-sm font-light">Demo</a>
            </div>
        </div>
    </nav>

    <!-- 随笔列表 -->
    <main class="pt-24 pb-16 px-4">
        <div class="max-w-2xl mx-auto fade-in" style="animation-delay: 0.2s">
            <header class="mb-10">
                <h1 class="text-3xl md:text-4xl font-light text-gray-800 mb-3">随笔</h1>
                <p class="text-gray-500 font-light">分享思考与技术</p>
            </header>

            <div class="space-y-6" id="postList">
                <!-- 随笔列表由 JS 动态生成，或直接在这里写 HTML -->
                <div class="post-item bg-white rounded-xl p-6 border border-gray-100 shadow-sm">
                    <a href="./post-template.html">
                        <div class="flex items-center justify-between mb-2">
                            <h2 class="text-xl font-medium text-gray-800 hover:text-gray-600 transition-colors">文章标题</h2>
                            <span class="text-xs text-gray-400">2024-01-01</span>
                        </div>
                        <p class="text-gray-500 text-sm line-clamp-2">这是文章的简介描述，几句话概括本文内容，让读者快速了解这篇文章讲了什么...</p>
                    </a>
                </div>

                <div class="post-item bg-white rounded-xl p-6 border border-gray-100 shadow-sm">
                    <a href="#">
                        <div class="flex items-center justify-between mb-2">
                            <h2 class="text-xl font-medium text-gray-800 hover:text-gray-600 transition-colors">前端架构思考</h2>
                            <span class="text-xs text-gray-400">2024-01-15</span>
                        </div>
                        <p class="text-gray-500 text-sm line-clamp-2">聊聊现代前端开发中的架构设计，组件化思想，以及如何维护大型项目...</p>
                    </a>
                </div>

                <div class="post-item bg-white rounded-xl p-6 border border-gray-100 shadow-sm">
                    <a href="#">
                        <div class="flex items-center justify-between mb-2">
                            <h2 class="text-xl font-medium text-gray-800 hover:text-gray-600 transition-colors">CSS 技巧总结</h2>
                            <span class="text-xs text-gray-400">2024-02-01</span>
                        </div>
                        <p class="text-gray-500 text-sm line-clamp-2">一些实用的 CSS 技巧让你的代码更简洁，布局更优雅...</p>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 移动端菜单切换
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // 搜索功能
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const searchContent = document.getElementById('searchContent');
        let posts = [];
        let selectedIndex = -1;

        // 加载搜索索引
        fetch('../search.json')
            .then(response => response.json())
            .then(data => {
                posts = data;
            })
            .catch(error => {
                console.log('加载搜索索引失败:', error);
            });

        // 搜索函数
        function performSearch(query) {
            if (!query.trim()) {
                searchResults.classList.add('hidden');
                selectedIndex = -1;
                return;
            }

            const lowerQuery = query.toLowerCase();
            const results = posts.filter(post => {
                return post.title.toLowerCase().includes(lowerQuery) ||
                       post.excerpt.toLowerCase().includes(lowerQuery);
            });

            displayResults(results, lowerQuery);
            selectedIndex = results.length > 0 ? 0 : -1;
            updateSelection();
        }

        // 高亮关键词
        function highlight(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<mark class="bg-yellow-200 rounded px-1">$1</mark>');
        }

        // 显示搜索结果
        function displayResults(results, query) {
            if (results.length === 0) {
                searchContent.innerHTML = '<div class="px-4 py-3 text-sm text-gray-400">未找到相关内容</div>';
                searchResults.classList.remove('hidden');
                return;
            }

            const html = results.map((post, index) => `
                <a href="../${post.url}" class="search-result-item block px-4 py-3 border-b border-gray-50 ${index === selectedIndex ? 'active' : ''}">
                    <div class="font-medium text-gray-800 text-sm mb-1">${highlight(post.title, query)}</div>
                    <div class="text-xs text-gray-400 mb-1">${post.date}</div>
                    <div class="text-xs text-gray-500 line-clamp-1">${post.excerpt}</div>
                </a>
            `).join('');

            searchContent.innerHTML = html;
            searchResults.classList.remove('hidden');
        }

        // 更新选中状态
        function updateSelection() {
            document.querySelectorAll('.search-result-item').forEach((item, index) => {
                if (index === selectedIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // 键盘导航
        searchInput.addEventListener('keydown', (e) => {
            const items = document.querySelectorAll('.search-result-item');
            if (items.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectedIndex = (selectedIndex + 1) % items.length;
                updateSelection();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectedIndex = selectedIndex <= 0 ? items.length - 1 : selectedIndex - 1;
                updateSelection();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (selectedIndex >= 0) {
                    const link = items[selectedIndex].getAttribute('href');
                    window.location.href = link;
                }
            } else if (e.key === 'Escape') {
                searchResults.classList.add('hidden');
                searchInput.value = '';
                selectedIndex = -1;
            }
        });

        // 输入事件
        searchInput.addEventListener('input', () => {
            performSearch(searchInput.value);
        });

        // 点击外部关闭搜索结果
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.classList.add('hidden');
            }
        });

        // 聚焦时显示结果
        searchInput.addEventListener('focus', () => {
            if (searchInput.value.trim()) {
                performSearch(searchInput.value);
            }
        });
    </script>
</body>
</html>
