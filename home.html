<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 | NekoChan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
    <!-- KaTeX for LaTeX formulas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
</head>
<body class="min-h-screen">
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md border-b border-gray-100 z-50 fade-in" style="animation-delay: 0.1s">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex-shrink-0">
                    <h1 class="text-xl font-medium text-gray-800">NekoChan</h1>
                </div>

                <!-- 导航菜单 -->
                <div class="hidden md:flex items-center space-x-8">
                    <a href="./writing/writing.html" class="nav-item text-gray-600 hover:text-gray-900 text-sm font-light transition-colors">随笔</a>
                    <a href="./profile/profile.html" class="nav-item text-gray-600 hover:text-gray-900 text-sm font-light transition-colors">简介</a>
                    <a href="./demo/demo.html" class="nav-item text-gray-600 hover:text-gray-900 text-sm font-light transition-colors">Demo</a>
                </div>

                <!-- 搜索框 -->
                <div class="relative search-container">
                    <div class="flex items-center bg-gray-50 rounded-full px-3 py-1.5 border border-gray-100 hover:border-gray-200 transition-all">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                        <input
                            type="text"
                            placeholder="搜索随笔..."
                            class="search-input bg-transparent ml-2 w-24 md:w-32 text-sm text-gray-700 placeholder-gray-400 focus:w-32 md:focus:w-48 transition-all duration-300"
                            id="searchInput"
                            autocomplete="off"
                        >
                    </div>
                    <!-- 搜索结果下拉框 -->
                    <div id="searchResults" class="absolute top-full right-0 mt-2 w-72 bg-white rounded-lg shadow-lg border border-gray-100 hidden max-h-80 overflow-y-auto z-50">
                        <div id="searchContent"></div>
                    </div>
                </div>

                <!-- 移动端菜单按钮 -->
                <button class="md:hidden flex items-center" id="mobileMenuBtn">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 移动端菜单 -->
        <div class="md:hidden hidden bg-white border-t border-gray-100" id="mobileMenu">
            <div class="px-4 py-3 space-y-3">
                <a href="./writing/writing.html" class="block text-gray-600 hover:text-gray-900 text-sm font-light">随笔</a>
                <a href="./profile/profile.html" class="block text-gray-600 hover:text-gray-900 text-sm font-light">简介</a>
                <a href="./demo/demo.html" class="block text-gray-600 hover:text-gray-900 text-sm font-light">Demo</a>
            </div>
        </div>
    </nav>

    <!-- 首屏 Hero Section - 全屏背景图 -->
    <main class="relative pt-16 min-h-screen flex items-center justify-center">
        <!-- 全屏背景图片 -->
        <div class="absolute inset-0 z-0">
            <img
                src="./photo/profile.png"
                alt="背景"
                class="w-full h-full object-cover"
            >
            <!-- 渐变遮罩，让文字更清晰 -->
            <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/30 to-black/40"></div>
        </div>

        <!-- 文字内容 -->
        <div class="relative z-10 max-w-4xl mx-auto text-center px-4 fade-in" style="animation-delay: 0.3s">
            <!-- <h2 class="text-4xl md:text-7xl font-light text-white mb-6 leading-tight drop-shadow-sm">
                保持思考，<br class="md:hidden">
                <span>持续创造</span>
            </h2>
            <p class="text-white/80 text-lg md:text-xl font-light mb-10 fade-in drop-shadow-sm" style="animation-delay: 0.5s">
                写代码，也写文字
            </p>-->
            <div class="flex items-center justify-center space-x-6 fade-in" style="animation-delay: 0.7s">
                <a href="./writing/writing.html" class="px-8 py-3 bg-white text-gray-900 rounded-full text-sm font-medium hover:bg-gray-100 transition-colors">
                    阅读随笔
                </a>
                <a href="./profile/profile.html" class="px-8 py-3 border border-white/60 text-white rounded-full text-sm font-light hover:bg-white/20 transition-colors">
                    了解更多
                </a>
            </div>
        </div>
    </main>
    <script src="./js/site.js?v=20260616.1" defer></script>
</body>
</html>
