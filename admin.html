<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记管理 | 个人主页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .editor-container {
            height: calc(100vh - 120px);
        }
        .editor textarea {
            resize: none;
        }
        .preview {
            overflow-y: auto;
        }
        .note-item:hover {
            background-color: #f5f5f5;
        }
        .note-item.active {
            background-color: #ebebeb;
        }
        .badge-published {
            background-color: #10b981;
            color: white;
        }
        .badge-draft {
            background-color: #6b7280;
            color: white;
        }
    </style>
</head>
<body class="bg-[#fbfbfb]">
    <!-- 顶部导航 -->
    <nav class="bg-white border-b border-gray-200 h-14 flex items-center px-4 justify-between">
        <div class="flex items-center space-x-4">
            <h1 class="text-lg font-medium text-gray-800">笔记管理</h1>
            <button id="btnSelectDir" class="px-3 py-1 bg-blue-500 text-white rounded text-sm hover:bg-blue-600 transition-colors" onclick="selectNotesDir()">
                选择 notes 文件夹
            </button>
            <span id="dirStatus" class="text-sm text-gray-500">未选择文件夹</span>
        </div>
        <div class="flex items-center space-x-3">
            <button id="btnNewNote" class="px-3 py-1 bg-green-500 text-white rounded text-sm hover:bg-green-600 transition-colors" onclick="newNote()" disabled>
                + 新建笔记
            </button>
            <a href="./index.html" class="px-3 py-1 bg-gray-500 text-white rounded text-sm hover:bg-gray-600 transition-colors">返回首页</a>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-56px)]">
        <!-- 左侧笔记列表 -->
        <div class="w-80 border-r border-gray-200 bg-white overflow-y-auto">
            <div class="p-3 border-b border-gray-100">
                <input type="text" id="searchInput" placeholder="搜索笔记..." class="w-full px-3 py-2 border border-gray-200 rounded text-sm focus:outline-none focus:border-blue-300" oninput="filterNotes()">
            </div>
            <div id="notesList" class="divide-y divide-gray-100">
                <div class="p-8 text-center text-gray-400 text-sm">
                    请先点击「选择 notes 文件夹」<br>授权浏览器访问本地文件夹
                </div>
            </div>
        </div>

        <!-- 右侧编辑区 -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <div class="flex-none flex items-center justify-between p-3 border-b border-gray-200 bg-gray-50">
                <div class="flex items-center space-x-4">
                    <h2 id="currentNoteTitle" class="text-lg font-medium text-gray-800">请选择或新建笔记</h2>
                </div>
                <div class="flex items-center space-x-3">
                    <label class="flex items-center space-x-2 text-sm text-gray-600">
                        <input type="checkbox" id="publishCheck" onchange="updateMetadata()">
                        <span>发布到网站</span>
                    </label>
                    <button id="btnSave" class="px-4 py-1.5 bg-blue-500 text-white rounded text-sm hover:bg-blue-600 transition-colors" onclick="saveNote()" disabled>
                        保存
                    </button>
                    <button id="btnDelete" class="px-4 py-1.5 bg-red-500 text-white rounded text-sm hover:bg-red-600 transition-colors" onclick="deleteNote()" disabled>
                        删除
                    </button>
                </div>
            </div>

            <!-- 元数据 -->
            <div class="flex-none p-3 border-b border-gray-200 bg-white grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">标题</label>
                    <input type="text" id="metaTitle" class="w-full px-3 py-2 border border-gray-200 rounded text-sm focus:outline-none focus:border-blue-300" oninput="updateMetadata()" placeholder="文章标题">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">日期</label>
                    <input type="date" id="metaDate" class="w-full px-3 py-2 border border-gray-200 rounded text-sm focus:outline-none focus:border-blue-300" onchange="updateMetadata()">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs text-gray-500 mb-1">简介</label>
                    <input type="text" id="metaExcerpt" class="w-full px-3 py-2 border border-gray-200 rounded text-sm focus:outline-none focus:border-blue-300" oninput="updateMetadata()" placeholder="1-2句话描述文章，用于列表展示">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs text-gray-500 mb-1">标签（逗号分隔）</label>
                    <input type="text" id="metaTags" class="w-full px-3 py-2 border border-gray-200 rounded text-sm focus:outline-none focus:border-blue-300" oninput="updateMetadata()" placeholder="技术, 生活, 心得">
                </div>
            </div>

            <!-- 编辑 + 预览 -->
            <div class="flex-1 flex editor-container">
                <div class="w-1/2 editor border-r border-gray-200 bg-gray-50">
                    <textarea id="editorContent" class="w-full h-full p-4 text-sm border-0 focus:outline-none" placeholder="在这里写 markdown 内容..." oninput="onEditorInput()" disabled></textarea>
                </div>
                <div class="w-1/2 preview bg-white p-4" id="previewArea">
                    <div class="text-gray-400 text-sm text-center mt-10">
                        选择或新建笔记后在这里预览
                    </div>
                </div>
            </div>

            <div class="flex-none p-3 bg-gray-50 border-t border-gray-200 text-sm text-gray-500 flex justify-between items-center">
                <span id="saveStatus"></span>
                <div>
                    写完后记得保存，然后到终端运行 <code class="bg-gray-200 px-2 py-0.5 rounded">cd scripts && python3 publish.py</code> 发布到网站
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // 使用 marked 解析 markdown
        import { marked } from 'https://cdn.jsdelivr.net/npm/marked@11/lib/marked.esm.js';
        window.marked = marked;

        // 代码高亮
        marked.setOptions({
            highlight: function(code, lang) {
                return code;
            }
        });
    </script>

    <script>
        let notesDirHandle = null;
        let notesFiles = [];
        let currentNote = null;
        let currentFileHandle = null;
        let searchQuery = '';

        // 检查 File System Access API 支持
        if (!('showDirectoryPicker' in window)) {
            document.getElementById('dirStatus').textContent = '你的浏览器不支持 File System Access API，请使用 Chrome/Edge 最新版本';
            document.getElementById('dirStatus').classList.add('text-red-500');
        }

        async function selectNotesDir() {
            try {
                notesDirHandle = await window.showDirectoryPicker();
                document.getElementById('dirStatus').textContent = `已选择: ${notesDirHandle.name}`;
                document.getElementById('dirStatus').classList.remove('text-gray-500');
                document.getElementById('dirStatus').classList.add('text-green-600');
                document.getElementById('btnNewNote').disabled = false;
                await loadNotesList();
            } catch (e) {
                console.error(e);
                alert('选择文件夹失败: ' + e.message);
            }
        }
        window.selectNotesDir = selectNotesDir;

        // 解析 frontmatter
        function parseFrontmatter(content) {
            const frontmatterRegex = /^---\s*$(.*?)^---\s*$/s;
            const match = content.match(frontmatterRegex);
            const metadata = {
                title: '',
                date: new Date().toISOString().split('T')[0],
                excerpt: '',
                publish: false,
                tags: ''
            };
            let body = content;

            if (match) {
                const frontmatterText = match[1];
                body = content.slice(match[0].length);

                frontmatterText.trim().split('\n').forEach(line => {
                    line = line.trim();
                    if (!line || !line.includes(':')) return;
                    const [key, ...valueParts] = line.split(':');
                    let value = valueParts.join(':').trim();
                    key = key.trim();
                    if (value.toLowerCase() === 'true') value = true;
                    if (value.toLowerCase() === 'false') value = false;
                    metadata[key] = value;
                });
            }

            return {metadata, body};
        }

        // 生成 frontmatter 文本
        function generateFrontmatter(metadata) {
            let lines = ['---'];
            for (const [key, value] of Object.entries(metadata)) {
                if (value !== undefined && value !== null) {
                    lines.push(`${key}: ${value}`);
                }
            }
            lines.push('---');
            return lines.join('\n') + '\n\n';
        }

        // 生成 slug
        function slugify(title) {
            return title
                .toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .trim();
        }

        // 加载笔记列表
        async function loadNotesList() {
            notesFiles = [];
            const notesListEl = document.getElementById('notesList');
            notesListEl.innerHTML = '';

            try {
                for await (const entry of notesDirHandle.values()) {
                    if (entry.kind === 'file' && entry.name.endsWith('.md')) {
                        const file = await entry.getFile();
                        const content = await file.text();
                        const {metadata} = parseFrontmatter(content);
                        notesFiles.push({
                            name: entry.name,
                            handle: entry,
                            metadata: metadata,
                            filename: entry.name
                        });
                    }
                }

                // 按日期降序排序
                notesFiles.sort((a, b) => {
                    return (b.metadata.date || '').localeCompare(a.metadata.date || '');
                });

                renderNotesList();
            } catch (e) {
                console.error(e);
                notesListEl.innerHTML = `<div class="p-4 text-red-500 text-sm">加载失败: ${e.message}</div>`;
            }
        }

        // 渲染笔记列表
        function renderNotesList() {
            const notesListEl = document.getElementById('notesList');
            let filtered = notesFiles;
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(n =>
                    (n.metadata.title || '').toLowerCase().includes(q) ||
                    (n.metadata.excerpt || '').toLowerCase().includes(q) ||
                    (n.filename || '').toLowerCase().includes(q)
                );
            }

            if (filtered.length === 0) {
                notesListEl.innerHTML = '<div class="p-8 text-center text-gray-400 text-sm">未找到笔记</div>';
                return;
            }

            notesListEl.innerHTML = filtered.map(note => {
                const isActive = currentNote && currentNote.filename === note.filename;
                const badgeClass = note.metadata.publish ? 'badge-published' : 'badge-draft';
                const badgeText = note.metadata.publish ? '已发布' : '草稿';
                return `
                    <div class="note-item ${isActive ? 'active' : ''} p-3 cursor-pointer" onclick="openNote('${note.filename}')">
                        <div class="flex items-start justify-between mb-1">
                            <div class="font-medium text-gray-800 text-sm truncate pr-2">${note.metadata.title || note.filename}</div>
                            <span class="px-2 py-0.5 rounded-full text-xs ${badgeClass}">${badgeText}</span>
                        </div>
                        <div class="text-xs text-gray-400 mb-1">${note.metadata.date || '无日期'}</div>
                        <div class="text-xs text-gray-500 line-clamp-1">${note.metadata.excerpt || ''}</div>
                    </div>
                `;
            }).join('');
        }

        function filterNotes() {
            searchQuery = document.getElementById('searchInput').value.trim();
            renderNotesList();
        }
        window.filterNotes = filterNotes;

        // 新建笔记
        function newNote() {
            const today = new Date().toISOString().split('T')[0];
            currentNote = {
                metadata: {
                    title: '',
                    date: today,
                    excerpt: '',
                    publish: false,
                    tags: ''
                },
                content: '',
                filename: ''
            };
            currentFileHandle = null;

            // 填充表单
            document.getElementById('currentNoteTitle').textContent = '新建笔记';
            document.getElementById('metaTitle').value = currentNote.metadata.title;
            document.getElementById('metaDate').value = currentNote.metadata.date;
            document.getElementById('metaExcerpt').value = currentNote.metadata.excerpt;
            document.getElementById('metaTags').value = currentNote.metadata.tags || '';
            document.getElementById('publishCheck').checked = currentNote.metadata.publish;
            document.getElementById('editorContent').value = '';
            document.getElementById('editorContent').disabled = false;
            document.getElementById('btnSave').disabled = false;
            document.getElementById('btnDelete').disabled = true;
            updatePreview();
            renderNotesList();
        }
        window.newNote = newNote;

        // 打开笔记
        async function openNote(filename) {
            const note = notesFiles.find(n => n.name === filename);
            if (!note) return;

            const file = await note.handle.getFile();
            const content = await file.text();
            const {metadata, body} = parseFrontmatter(content);

            currentNote = {
                metadata: metadata,
                content: body,
                filename: filename
            };
            currentFileHandle = note.handle;

            // 填充表单
            document.getElementById('currentNoteTitle').textContent = metadata.title || filename;
            document.getElementById('metaTitle').value = metadata.title || '';
            document.getElementById('metaDate').value = metadata.date || new Date().toISOString().split('T')[0];
            document.getElementById('metaExcerpt').value = metadata.excerpt || '';
            document.getElementById('metaTags').value = metadata.tags || '';
            document.getElementById('publishCheck').checked = !!metadata.publish;
            document.getElementById('editorContent').value = body.trim();
            document.getElementById('editorContent').disabled = false;
            document.getElementById('btnSave').disabled = false;
            document.getElementById('btnDelete').disabled = false;

            updatePreview();
            renderNotesList();
        }
        window.openNote = openNote;

        // 更新元数据
        function updateMetadata() {
            if (!currentNote) return;
            currentNote.metadata.title = document.getElementById('metaTitle').value;
            currentNote.metadata.date = document.getElementById('metaDate').value;
            currentNote.metadata.excerpt = document.getElementById('metaExcerpt').value;
            currentNote.metadata.tags = document.getElementById('metaTags').value;
            currentNote.metadata.publish = document.getElementById('publishCheck').checked;
            document.getElementById('currentNoteTitle').textContent = currentNote.metadata.title || '未命名';
        }
        window.updateMetadata = updateMetadata;

        // 编辑器输入
        function onEditorInput() {
            if (!currentNote) return;
            currentNote.content = document.getElementById('editorContent').value;
            updatePreview();
        }
        window.onEditorInput = onEditorInput;

        // 更新预览
        function updatePreview() {
            if (!currentNote || !window.marked) {
                document.getElementById('previewArea').innerHTML = '<div class="text-gray-400 text-sm text-center mt-10">加载中...</div>';
                return;
            }
            const html = window.marked.parse(currentNote.content || '');
            // 添加文章内容样式类
            document.getElementById('previewArea').innerHTML = `<div class="article-content">${html}</div>`;
        }

        // 保存笔记
        async function saveNote() {
            if (!notesDirHandle || !currentNote) return;

            updateMetadata();

            // 验证必填字段
            if (!currentNote.metadata.title.trim()) {
                alert('请填写文章标题');
                return;
            }

            const slug = slugify(currentNote.metadata.title);
            const filename = currentFileHandle ? currentNote.filename : `${slug}.md`;

            // 组合完整内容
            const fullContent = generateFrontmatter(currentNote.metadata) + (currentNote.content || '').trim() + '\n';

            try {
                let fileHandle;
                if (currentFileHandle) {
                    // 覆盖已有文件
                    const writable = await currentFileHandle.createWritable();
                    await writable.write(fullContent);
                    await writable.close();
                    fileHandle = currentFileHandle;
                } else {
                    // 新建文件
                    fileHandle = await notesDirHandle.getFileHandle(filename, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(fullContent);
                    await writable.close();
                    currentFileHandle = fileHandle;
                    currentNote.filename = filename;
                }

                document.getElementById('saveStatus').textContent = `✓ 已保存 ${filename} (${new Date().toLocaleTimeString()})`;
                document.getElementById('saveStatus').className = 'text-green-600';

                await loadNotesList();
            } catch (e) {
                console.error(e);
                document.getElementById('saveStatus').textContent = `✗ 保存失败: ${e.message}`;
                document.getElementById('saveStatus').className = 'text-red-500';
                alert('保存失败: ' + e.message);
            }
        }
        window.saveNote = saveNote;

        // 删除笔记
        async function deleteNote() {
            if (!currentFileHandle || !confirm('确认删除这篇笔记吗？删除后无法恢复。')) return;

            try {
                await notesDirHandle.removeEntry(currentFileHandle.name);
                currentNote = null;
                currentFileHandle = null;

                document.getElementById('currentNoteTitle').textContent = '请选择或新建笔记';
                document.getElementById('metaTitle').value = '';
                document.getElementById('metaExcerpt').value = '';
                document.getElementById('editorContent').value = '';
                document.getElementById('editorContent').disabled = true;
                document.getElementById('btnSave').disabled = true;
                document.getElementById('btnDelete').disabled = true;
                document.getElementById('previewArea').innerHTML = '<div class="text-gray-400 text-sm text-center mt-10">选择或新建笔记后在这里预览</div>';
                document.getElementById('saveStatus').textContent = '';

                await loadNotesList();
            } catch (e) {
                console.error(e);
                alert('删除失败: ' + e.message);
            }
        }
        window.deleteNote = deleteNote;
    </script>
</body>
</html>
